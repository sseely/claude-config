# Merge this job into your existing .github/workflows/ci.yml.
# ADAPT: replace PROJECT_NAME with your project's SBOM filename prefix (e.g. my-app).
# ADAPT: confirm R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET
#        match the secret/var names configured in your GitHub repo settings.

  sbom:
    name: Generate SBOMs (SPDX + CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft dir:ui \
            --source-name PROJECT_NAME \
            --select-catalogers npm \
            --select-catalogers -file \
            -o spdx-json=sbom.PROJECT_NAME.spdx.json \
            -o cyclonedx-json=sbom.PROJECT_NAME.cdx.json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: 'sbom.*.json'
          retention-days: 90

      - name: Upload SBOMs to R2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          for f in sbom.PROJECT_NAME.spdx.json sbom.PROJECT_NAME.cdx.json; do
            aws s3 cp "$f" "s3://${R2_BUCKET}/sbom/latest/$f" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/json
          done
